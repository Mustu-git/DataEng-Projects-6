name: dbt CI

on:
  push:
    branches: [main]
    paths:
      - "dbt/**"
  pull_request:
    branches: [main]
    paths:
      - "dbt/**"

jobs:
  dbt-test:
    name: Run dbt tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.8.*

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          nyc_taxi:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SF_ACCOUNT }}
                user: ${{ secrets.SF_USER }}
                password: ${{ secrets.SF_PASSWORD }}
                database: NYC_TAXI
                schema: ANALYTICS_CI
                warehouse: COMPUTE_WH
                role: ACCOUNTADMIN
                threads: 4
          EOF

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt run
        working-directory: dbt
        run: dbt run --select staging marts

      - name: dbt test
        working-directory: dbt
        run: dbt test
